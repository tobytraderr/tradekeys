[phases.setup]
nixPkgs = ["nodejs_20", "python311", "python311Packages.pip"]

[phases.install]
cmds = [
  "npm ci",
  "python -m venv /app/.venv",
  "/app/.venv/bin/python -m pip install --upgrade pip",
  "/app/.venv/bin/python -m pip install -r requirements.txt"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "PYTHON_BIN=/app/.venv/bin/python npm run start:railway"
